---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Terragrunt CD
permissions: { contents: read }

on:
  workflow_dispatch: {}
  schedule: [{cron: '0 0 * * *'}] # Every day at midnight
  push:
    branches: ["main"]
    paths:
      - root.hcl
      - infrastructure/**
      - terraform/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TG_NON_INTERACTIVE: "true"

jobs:
  apply:
    runs-on: infra-runners
    environment: TrueNAS
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup mise
        run: mise install

      - name: Load Secrets
        uses: ./.github/actions/load-secrets
        with:
          op-connect-host: ${{ secrets.OP_CONNECT_HOST }}
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Init
        run: terragrunt run --all -- init -upgrade
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Apply
        run: terragrunt run --all -- apply -auto-approve
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
