---
services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.2.5
    restart: unless-stopped
    command: start
    environment:
      - TZ=Europe/Bucharest
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=keycloak.nas.svc.h.mirceanton.com
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USERNAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    expose: ["8080"]
    networks: ["traefik_network"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.nas.svc.h.mirceanton.com`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=cloudflare"

  keycloak-db:
    container_name: keycloak-db
    image: docker.io/postgres:17
    restart: unless-stopped
    user: "568:568"
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - /mnt/tank/Apps/Keycloak/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: ["traefik_network"]

networks:
  traefik_network:
    external: true
