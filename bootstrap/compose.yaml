---
configs:
  poll-config.yml:
    content: |
      - url: https://github.com/mirceanton/truenas-apps.git
        reference: main
        interval: 3600

secrets:
  1pw_token:
    file: /root/.doco-cd/1pw_token

volumes:
  data: {}

services:
  app:
    container_name: doco-cd
    image: ghcr.io/kimdre/doco-cd:0.91.0@sha256:dfe53c9c5a673b17582683798ccda0f955e81a7f995d09b7cc2ff452dfd4ede1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data

    secrets: ["1pw_token"]
    configs:
      - source: poll-config.yml
        target: /poll-config.yml

    environment:
      TZ: Europe/Bucharest
      LOG_LEVEL: info
      POLL_CONFIG_FILE: /poll-config.yml
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token

    healthcheck:
      test: [CMD, /doco-cd, healthcheck]
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
